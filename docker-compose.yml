services:
  db:
    image: mysql:8.4
    container_name: procurement_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-procurement_db}
      MYSQL_USER: ${MYSQL_USER:-procurement}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-procurement}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile    # ← явно указываем имя файла
    container_name: procurement_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_NAME: Procurement Analytics API
      ENVIRONMENT: development
      DEBUG: "true"
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:-procurement}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-procurement}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-procurement_db}
      MYSQL_CHARSET: utf8mb4
      CORS_ORIGINS_RAW: "http://localhost:3000,http://localhost:5173"
      UPLOAD_MAX_SIZE_MB: 20
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile    # ← явно указываем имя файла
      args:
        VITE_API_URL: http://localhost:8000
    container_name: procurement_frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:80"

volumes:
  mysql_data: